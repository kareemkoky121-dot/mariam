<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my fav sis ❤️</title>
    <style>
        /* التنسيق العام */
        body { margin: 0; background: #ffc0cb; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: serif; }
        
        /* شاشة البداية */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffc0cb; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; color: #d81b60; font-weight: bold; text-align: center; }
        .heart-icon { font-size: 60px; animation: pulse 1s infinite; margin-bottom: 10px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* تنسيق الصورة الشخصية */
        .user-photo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .user-photo::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid #d81b60;
            box-shadow: 0 0 18px rgba(216, 27, 96, 0.4);
            clip-path: path('M50 15 C35 0 0 24 0 52 C0 80 35 96 50 100 C65 96 100 80 100 52 C100 24 65 0 50 15 Z');
            pointer-events: none;
        }
        .user-photo img {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover;
        }

        /* أنيميشن القلب الطاير */
        .container {
            position: relative;
            width: 420px;
            height: 420px;
            transform-style: preserve-3d;
            animation: beat 1.5s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .word { color: #d81b60; position: absolute; white-space: nowrap; opacity: 0; animation: move 4s infinite linear; font-weight: bold; font-size: 1.1rem; }
        @keyframes move { 0% { opacity: 0; transform: translate3d(var(--tx), var(--ty), -150px) scale(0.5); } 40% { opacity: 1; } 100% { opacity: 0; transform: translate3d(var(--tx), var(--ty), 150px) scale(1.4); } }
    </style>
</head>
<body>

    <!-- الشاشة الافتتاحية -->
    <div id="overlay" onclick="start()">
        <div class="heart-icon">❤️</div>
        <p style="font-size: 1.2rem;">open ur gift my love🫣🫣</p>
    </div>

    <!-- القلب الطاير -->
    <div class="container" id="heart">
        <!-- الصورة الشخصية (بتظهر مع القلب) -->
        <div class="user-photo" id="photo-div" style="display: none;">
            <!-- 👇 حط اسم صورتك هنا (مثلاً dandan.jpg) 👇 -->
            <img src="myphoto.jpg" alt="Marioom">
        </div>
    </div>

    <!-- الأغنية -->
    <audio id="music" controls loop style="display: none;">
        <source src="angel.mp3" type="audio/mpeg">
    </audio>

    <script>
        const heart = document.getElementById('heart');
        const text = "ilove you"; // الاسم اللي بيلف في القلب

        // إنشاء شكل القلب من الكلمات
        for (let i = 0; i < 120; i++) {
            const div = document.createElement('div');
            div.className = 'word';
            div.innerText = text;
            const a = (i / 120) * Math.PI * 2;
            const x = 180 * Math.pow(Math.sin(a), 3);
            const y = -(150 * Math.cos(a) - 60 * Math.cos(2*a) - 30 * Math.cos(3*a) - 10 * Math.cos(4*a));
            div.style.setProperty('--tx', x + 'px');
            div.style.setProperty('--ty', y + 'px');
            div.style.animationDelay = (i/120) * -4 + 's';
            heart.appendChild(div);
        }

        // دالة التشغيل
        function start() {
            const audio = document.getElementById('music');
            audio.play().catch(e => console.log("الصوت لم يتمكن من التشغيل"));
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('photo-div').style.display = 'block';
        }
    </script>
</body>
</html>
